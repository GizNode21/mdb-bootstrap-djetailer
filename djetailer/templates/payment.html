{% extends 'base.html' %}
{% block extrahead %}
<link rel="stylesheet" href="css/stripe.css" />
{% endblock %}
{% block content %}
<!--Main layout-->
<main>
    <div class="container">
        <!-- Heading -->
        <h2 class="my-5 text-center">Payment</h2>
        <!--Grid row-->
        <div class="row">
            <!--Grid column-->
            <div class="col-md-8 mb-4">
                <!--Card-->
                <div class="card p-4">
                    <form method="POST" id="payment-form" action="/return/">
                        <div id="link-authentication-element">
                            <!-- Elements will create authentication element here -->
                        </div>
                        <div id="payment-element">
                            <!-- Elements will create form elements here -->
                        </div>
                        <button type="submit" id="submit" class="btn btn-warning">Pay now</button>
                        <div id="error-message">
                            <!-- Display error message to your customers here -->
                        </div>
                    </form>
                    <div id="messages" role="alert" style="display: none;"></div>
                </div>
                <!--/.Card-->
            </div>
            <!--Grid column-->
            <div class="col-md-8 mb-4">
                <h3>Invoice</h3>
                <h4 class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-muted">Total Due</span>
                    <span class="text-muted">${{ object.get_grand_total }} (Cart
                        <span class="badge rounded-pill badge-primary">
                            {{ object.items.count}}
                        </span>
                        )
                    </span>
                </h4>
                {% include 'order_snippet.html' %}
            </div>
        </div>
        <!--Grid row-->
    </div>
</main>
<!--Main layout-->
<script src="https://js.stripe.com/v3/"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Load the publishable key from the server. The publishable key
        // is set in your .env file.
        const stripePublishableKey = { "publishableKey": "{{ stripeKey }}" }
        console.log(stripePublishableKey)
        const { publishableKey } = stripePublishableKey; /*await fetch(stripePublishableKey, {
            method: "GET", headers: {
                "Content-Type":
                    "application/json"
            }
        }).then((r) => r.json());*/
        if (!publishableKey) {
            /*addMessage(
                'No publishable key returned from the server. Please check `.env` and try again'
            );*/
            alert('Please set your Stripe publishable API key in the .env file');
        }

        const stripe = Stripe(publishableKey, {
            apiVersion: '2020-08-27',
        });

        // On page load, we create a PaymentIntent on the server so that we have its clientSecret to
        // initialize the instance of Elements below. The PaymentIntent settings configure which payment
        // method types to display in the PaymentElement.
        const {
            error: backendError,
            clientSecret
        } = await fetch('/create-payment-intent').then(r => r.json());
        if (backendError) {
            //addMessage(backendError.message);
        }
        //addMessage(`Client secret returned.`);

        // Initialize Stripe Elements with the PaymentIntent's clientSecret,
        // then mount the payment element.
        const loader = 'auto'
        const elements = stripe.elements({ clientSecret, loader });
        const paymentElement = elements.create('payment');
        paymentElement.mount('#payment-element');
        // Create and mount the linkAuthentication Element to enable autofilling customer payment details
        const linkAuthenticationElement = elements.create("linkAuthentication");
        linkAuthenticationElement.mount("#link-authentication-element");
        // If the customer's email is known when the page is loaded, you can
        // pass the email to the linkAuthenticationElement on mount:
        //
        // linkAuthenticationElement.mount("#link-authentication-element", {
        // defaultValues: {
        // email: 'jenny.rosen@example.com',
        // }
        // })
        // If you need access to the email address entered:
        //
        // linkAuthenticationElement.on('change', (event) => {
        // const email = event.value.email;
        // console.log({ email });
        // })

        // When the form is submitted...
        const form = document.getElementById('payment-form');
        let submitted = false;
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            // Disable double submission of the form
            if (submitted) { return; }
            submitted = true;
            form.querySelector('button').disabled = true;
            const nameInput = document.querySelector('#name');

            // Confirm the payment given the clientSecret
            // from the payment intent that was just created on
            // the server.
            const { error: stripeError } = await stripe.confirmPayment({
                elements,
                confirmParams: {
                    return_url: `${window.location.origin}/return`,
                }
            });

            if (stripeError) {
                //addMessage(stripeError.message);

                // reenable the form.
                submitted = false;
                form.querySelector('button').disabled = false;
                return;
            }
        });
    });
</script>
{% endblock %}
